<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJ's Supermarket | جي جي سوبر ماركت</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <div class="container">
            <h1>JJ's Supermarket</h1>
            <p>منصة العرض الذكية للمنتجات</p>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="ابحث عن منتج أو باركود..." onkeyup="filterProducts()">
            </div>
        </div>
    </header>

    <main class="container">
        <div id="product-container" class="product-grid">
            <div class="loading-status">جاري الاتصال بقاعدة البيانات...</div>
        </div>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 JJ's Supermarket - جميع الحقوق محفوظة</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
